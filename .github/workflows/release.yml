name: GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  verify:
    name: Verify release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out tagged source
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: npm

      - name: Verify tag is based on main
        shell: bash
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Verify tag matches extension version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          test "$version" = "$(node -p "require('./package.json').version")"
          node -e "const fs=require('fs');const version=process.argv[1];if(!fs.readFileSync('CHANGELOG.md','utf8').includes('## ['+version+']'))process.exit(1)" "$version"

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run check

      - name: Audit dependencies and registry signatures
        run: npm run audit:dependencies

  build:
    name: Build and smoke-test release asset
    needs: verify
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out tagged source
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VSIX
        run: npm run package:vsix

      - name: Generate CycloneDX SBOM
        shell: pwsh
        run: npm sbom --omit=dev --sbom-format cyclonedx | Out-File -Encoding utf8 "artifacts/ssh-onboard-$($env:GITHUB_REF_NAME.Substring(1)).sbom.cdx.json"

      - name: Install the exact VSIX in an isolated VS Code profile
        run: node scripts/smoke-install-vsix.mjs

      - name: Attest VSIX build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: artifacts/*.vsix

      - name: Create checksums
        shell: pwsh
        run: |
          $lines = Get-ChildItem artifacts -File | Where-Object { $_.Extension -in '.vsix', '.json' } | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          }
          $lines | Set-Content -Encoding ascii artifacts/SHA256SUMS.txt

      - name: Upload immutable release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ github.sha }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish approved release asset
    needs: build
    runs-on: windows-latest
    environment: github-release
    permissions:
      contents: write

    steps:
      - name: Check out tagged source
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0

      - name: Download the tested release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets-${{ github.sha }}
          path: artifacts

      - name: Verify downloaded asset checksums
        shell: pwsh
        run: |
          foreach ($line in Get-Content artifacts/SHA256SUMS.txt) {
            $expected, $name = $line -split '  ', 2
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path 'artifacts' $name)).Hash.ToLowerInvariant()
            if ($actual -ne $expected) { throw "Checksum mismatch: $name" }
          }

      - name: Compose governed release notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $templateName = if ($env:GITHUB_REF_NAME.Contains('-')) { 'preview.md' } else { 'stable.md' }
          $template = Get-Content -Raw (Join-Path '.github/release-notes' $templateName)
          $generated = gh api --method POST "repos/$env:GITHUB_REPOSITORY/releases/generate-notes" -f "tag_name=$env:GITHUB_REF_NAME" | ConvertFrom-Json
          $body = $template.Replace('{{VERSION}}', $version).Replace('{{GENERATED_NOTES}}', [string]$generated.body)
          $body | Set-Content -Encoding utf8 release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $arguments = @('--verify-tag', '--notes-file', 'release-notes.md')
          if ($env:GITHUB_REF_NAME.Contains('-')) {
            $arguments += '--prerelease'
          }
          $assets = Get-ChildItem artifacts -File | Where-Object { $_.Extension -in '.vsix', '.json', '.txt' } | ForEach-Object FullName
          gh release create $env:GITHUB_REF_NAME @assets @arguments
