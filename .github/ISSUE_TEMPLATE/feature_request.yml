name: Feature request
description: Propose a focused improvement to SSH Onboard.
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        SSH Onboard intentionally stays a thin enhancement for Microsoft's Remote - SSH. Requests to replace Remote - SSH, store passwords, or add an independent SFTP/terminal stack are outside the current product boundary.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest user-visible behavior that would solve the problem.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: boundary
    attributes:
      label: Project boundary
      options:
        - label: This request keeps Remote - SSH responsible for the remote development session.
          required: true
        - label: This request does not require SSH passwords to be stored.
          required: true
